name: Deploy Nuxt site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package-lock.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .nuxt
            .output
          key: ${{ runner.os }}-nuxt-build-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-build-

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Static HTML export with Nuxt
        run: ${{ steps.detect-package-manager.outputs.manager }} run generate
        env:
          NUXT_APP_BASE_URL: /skynet-nuxt/

      # [FIX] GitHub Pages по умолчанию запускает Jekyll обработку, которая
      # удаляет файлы и папки начинающиеся с `_` (_nuxt/, _payload.json).
      # .nojekyll отключает Jekyll и сохраняет статику Nuxt как есть.
      - name: Disable Jekyll processing
        run: touch ./.output/public/.nojekyll

      - name: Verify artifact integrity
        run: |
          echo "[FIX] Build output contents:"
          ls -la ./.output/public/
          echo "[FIX] .nojekyll exists: $([ -f ./.output/public/.nojekyll ] && echo yes || echo no)"
          echo "[FIX] Total size: $(du -sh ./.output/public/ | cut -f1)"

          if [ ! -f ./.output/public/.nojekyll ]; then
            echo "::error::.nojekyll missing — GitHub Pages deploy will fail"
            exit 1
          fi
          if [ ! -d ./.output/public/_nuxt ]; then
            echo "::error::_nuxt/ directory missing — build output is incomplete"
            exit 1
          fi
          echo "[FIX] Artifact integrity check passed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
