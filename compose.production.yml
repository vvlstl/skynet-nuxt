# compose.production.yml — Production hardening
# Usage: docker compose -f compose.yml -f compose.production.yml up -d

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-security: &default-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  app:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-skynet-nuxt}:${VERSION:-latest}
    <<: *default-security
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    restart: unless-stopped

  angie:
    <<: *default-security
    read_only: false
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/cache/angie:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=10m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging: *default-logging
    restart: unless-stopped
