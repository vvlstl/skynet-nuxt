# compose.override.yml — Development overrides (auto-merged by docker compose up)

services:
  app:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${APP_PORT:-3000}:3000"
      - "9229:9229"
    environment:
      NODE_ENV: development
    command: npm run dev

  angie:
    volumes:
      - ./docker/angie/nginx.dev.conf:/etc/angie/nginx.conf:ro
    ports:
      - "80:80"
