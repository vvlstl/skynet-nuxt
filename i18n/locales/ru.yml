    Эту сеть невозможно выключить извне.

manifest:
  title: СКАЖИ «НЕТ» ЧЕБУРНЕТУ
  text: |-
    Интернет пытаются превратить в закрытый загон с тремя разрешёнными сайтами
    и бесконечными замедлениями. Мы создали SKYNET не для того, чтобы вы мирились
    с ограничениями. Мы используем протоколы нового поколения VLESS, которые
    маскируют ваш трафик под обычный безопасный веб-серфинг. Для цензоров вас
    просто не существует в сети. Оставайтесь частью глобального мира, что бы ни
    происходило снаружи.

