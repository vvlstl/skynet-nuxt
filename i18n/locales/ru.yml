demo-access:
  title: ТЕСТ-ДРАЙВ ПРОТОКОЛА
  subtitle: ПОЛУЧИ ВРЕМЕННЫЙ VLESS-КЛЮЧ И&nbsp;УБЕДИСЬ, ЧТО ЧЕБУРНЕТ&nbsp;&mdash; НЕ&nbsp;ПРИГОВОР
  desc: Удержи кнопку 3&nbsp;секунды&nbsp;&mdash; Skynet установит защищённый туннель и&nbsp;сгенерирует твой персональный VLESS-ключ. Ключ действует 6&nbsp;часов.
  desc-active: Твой персональный VLESS-ключ сгенерирован. Скопируй его и&nbsp;импортируй в&nbsp;клиент.
  step1:
    title: Активируй шлюз
    desc: Зажми кнопку на&nbsp;3&nbsp;секунды&nbsp;&mdash; SKYNET сгенерирует персональный ключ и&nbsp;установит защищённый туннель
  step2:
    title: Скопируй VLESS-ключ
    desc: Твой персональный токен доступа готов. Скопируй его одним нажатием&nbsp;&mdash; он&nbsp;действует 6&nbsp;часов
  step3:
    title: Импортируй в&nbsp;клиент
    desc: Вставь ключ в&nbsp;любой VLESS-клиент. Один клик&nbsp;&mdash; и&nbsp;ты&nbsp;онлайн. Границы стёрты, Чебурнет позади
  step4:
    title: Оформи постоянный канал
    desc: Убедился в&nbsp;качестве? Перейди в&nbsp;Telegram-бот и&nbsp;выбери тариф от&nbsp;NET RUNNER до&nbsp;CYBER CITIZEN
  terminal:
