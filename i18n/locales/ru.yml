manifest:
  title: СКАЖИ &laquo;НЕТ&raquo; ЧЕБУРНЕТУ
  text: |-
    Интернет пытаются превратить в&nbsp;закрытый загон с&nbsp;тремя разрешёнными сайтами
    и&nbsp;бесконечными замедлениями. Мы&nbsp;создали SKYNET не&nbsp;для того, чтобы вы&nbsp;мирились
    с&nbsp;ограничениями. Мы&nbsp;используем протоколы нового поколения VLESS, которые
    маскируют ваш трафик под обычный безопасный веб-серфинг. Для цензоров вас
    просто не&nbsp;существует в&nbsp;сети. Оставайтесь частью глобального мира, что&nbsp;бы ни
    происходило снаружи.

