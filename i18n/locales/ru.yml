    ticker-idle: |-
      &rsquo;NODE_SCAN: 127/127&nbsp;UPLINK: READY PROTOCOL: VLESS+REALITY STATUS: AWAITING_AUTH LATENCY: 12ms&rsquo;
    ticker-active: |-
      &rsquo;KEY_GENERATED: OK&nbsp;SESSION_START TTL: 6H&nbsp;NODE: node01.skynet.net PROTOCOL: VLESS+REALITY ENC: XTLS&rsquo;
