name: ${COMPOSE_PROJECT_NAME:-skynet-nuxt}

services:
  app:
    build:
      context: .
      target: production
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - frontend

  angie:
    image: docker.angie.software/angie:1.11-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/angie/nginx.conf:/etc/angie/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

volumes:
  nginx_data:

networks:
  frontend:
    driver: bridge